        async function applyBulkChanges() {
            const selectedIds = Array.from(selectedExpenses);
            if (selectedIds.length === 0) {
                alert('Please select at least one expense');
                return;
            }

            const categoryChange = document.getElementById('bulkCategoryChange').value;
            const statusChange = document.getElementById('bulkStatusChange').value;

            if (!categoryChange && !statusChange) {
                alert('Please select a category or status to change');
                return;
            }

            if (!confirm(`Apply changes to ${selectedIds.length} expense(s)?`)) {
                return;
            }

            const user = users[0];
            let successCount = 0;
            let errorCount = 0;

            for (const expenseId of selectedIds) {
                try {
                    // For status changes, we need to use transitions
                    if (statusChange) {
                        if (statusChange === 'archived') {
                            const response = await fetch(`${API_BASE}/expenses/${expenseId}/archive`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ userId: user.id })
                            });
                            if (!response.ok) throw new Error('Archive failed');
                        } else if (statusChange === 'active') {
                            // Check current state - if archived, restore it
                            const expenseResponse = await fetch(`${API_BASE}/expenses/${expenseId}`);
                            if (expenseResponse.ok) {
                                const expense = await expenseResponse.json();
                                if (expense.state === 'archived') {
                                    const response = await fetch(`${API_BASE}/expenses/${expenseId}/restore`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ userId: user.id })
                                    });
                                    if (!response.ok) throw new Error('Restore failed');
                                }
                            }
                        }
                    }

                    // Update category if needed
                    if (categoryChange) {
                        const response = await fetch(`${API_BASE}/expenses/${expenseId}`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ category: categoryChange })
                        });
                        if (!response.ok) throw new Error('Update failed');
                    }

                    successCount++;
                } catch (error) {
                    console.error(`Error updating expense ${expenseId}:`, error);
                    errorCount++;
                }
            }

            clearSelection();
            await loadExpenses();
            await loadStatistics();
            
            if (errorCount > 0) {
                alert(`Updated ${successCount} expense(s). ${errorCount} failed.`);
            } else {
                alert(`Successfully updated ${successCount} expense(s).`);
            }
        }

            if (!confirm(`Are you sure you want to delete ${selectedIds.length} expense(s)? This action cannot be undone.`)) {

            if (errorCount > 0) {

        // Update month dropdown with totals for the selected year
        async function updateMonthDropdownWithTotals(year, selectedMonth) {
            const container = document.getElementById('monthDropdownContainer');
            if (!container) return;

            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                              'July', 'August', 'September', 'October', 'November', 'December'];

            // Fetch all expenses for the year to calculate monthly totals
            let monthlyTotals = new Array(12).fill(0);
            
            try {
                // Get year start and end dates in GMT+8
                const yearStart = new Date(Date.UTC(year, 0, 1, 0, 0, 0, 0) - (8 * 60 * 60 * 1000));
                const yearEnd = new Date(Date.UTC(year, 11, 31, 23, 59, 59, 999) - (8 * 60 * 60 * 1000));

                // Only fetch active (non-archived) expenses
                const response = await fetch(`${API_BASE}/expenses?state=active&startDate=${yearStart.toISOString()}&endDate=${yearEnd.toISOString()}&limit=10000`);
                
                if (response.ok) {
                    const data = await response.json();
                    // API returns array directly, not wrapped in {expenses: []}
                    const expenses = Array.isArray(data) ? data : (data.expenses || []);
                    
                    console.log(`Found ${expenses.length} active expenses for ${year}`, expenses.slice(0, 3));
                    
                    // Calculate totals by month
                    expenses.forEach(expense => {
                        if (expense.date) {
                            const dateParts = expense.date.split('-');
                            if (dateParts.length >= 2) {
                                const month = parseInt(dateParts[1]) - 1; // 0-indexed
                                if (month >= 0 && month < 12) {
                                    monthlyTotals[month] += (expense.amount || 0);
                                }
                            }
                        }
                    });
                    
                    console.log('Monthly totals (active only):', monthlyTotals);
                }
            } catch (error) {
                console.error('Error fetching monthly totals:', error);
            }

            // Find selected month name and total
            const selectedMonthIndex = selectedMonth - 1;
            const selectedMonthName = monthNames[selectedMonthIndex];
            const selectedTotal = monthlyTotals[selectedMonthIndex];

            // Format currency
            const formatCurrency = (amount) => {
                return new Intl.NumberFormat('en-PH', {
                    style: 'currency',
                    currency: 'PHP',
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }).format(amount);
            };

            // Build custom dropdown HTML
            const totalAmount = selectedTotal > 0 ? `<span class="custom-month-total">${formatCurrency(selectedTotal)}</span>` : '<span class="custom-month-total">₱0.00</span>';
            
            let dropdownHTML = `
                <div class="custom-month-dropdown" id="customMonthDropdown">
                    <div class="custom-month-selected" onclick="toggleMonthDropdown()" id="monthDropdownSelected">
                        <span class="custom-month-name">${selectedMonthName}</span>
                        ${totalAmount}
                        <span class="material-icons" style="font-size: 18px; color: var(--gray-400);">expand_more</span>
                    </div>
                    <div class="custom-month-options" id="monthDropdownOptions">
            `;

            // Generate options for each month
            monthNames.forEach((monthName, index) => {
                const monthNum = index + 1;
                const isSelected = monthNum === selectedMonth;
                const monthTotal = monthlyTotals[index];
                const totalDisplay = monthTotal > 0 ? formatCurrency(monthTotal) : '₱0.00';
                
                dropdownHTML += `
                    <div class="custom-month-option${isSelected ? ' selected' : ''}" onclick="selectMonth(${monthNum}, ${year})">
                        <span class="month-name">${monthName}</span>
                        <span class="month-total">${totalDisplay}</span>
                    </div>
                `;
            });

            dropdownHTML += `
                    </div>
                </div>
            `;

            container.innerHTML = dropdownHTML;
        }

        // Render daily totals table
        function renderDailyTotals(dailyTotals, year, month) {
            const contentDiv = document.getElementById('dailyTotalsContent');
            if (!contentDiv) return;
            
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 
                              'July', 'August', 'September', 'October', 'November', 'December'];
            const monthName = monthNames[month - 1];
            
            // Filter out any dates that don't match the selected month/year
            // This is a safety measure in case backend returns dates from adjacent months
            const filteredTotals = dailyTotals.filter(day => {
                if (!day.day) return false;
                const dateParts = day.day.split('-');
                if (dateParts.length !== 3) return false;
                const resultYear = parseInt(dateParts[0]);
                const resultMonth = parseInt(dateParts[1]);
                return resultYear === year && resultMonth === month;
            });
            
            if (filteredTotals.length === 0) {
                contentDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon"><span class="material-icons">calendar_today</span></div>
                        <h3>No expenses found</h3>
                        <p>No expenses recorded for ${monthName} ${year}</p>
                    </div>
                `;
                return;
            }
            
            // Calculate total for the month
            const monthTotal = filteredTotals.reduce((sum, day) => sum + (day.total_amount || 0), 0);
            const monthCount = filteredTotals.reduce((sum, day) => sum + (day.count || 0), 0);
            
            // Format day names
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            
            let tableHTML = `
                <table class="daily-totals-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th style="text-align: center;">Count</th>
                            <th style="text-align: right;">Total Amount</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            filteredTotals.forEach(day => {
                // Parse the date string properly to avoid timezone issues
                // day.day is in format "YYYY-MM-DD", parse it as local date
                const dateParts = day.day.split('-');
                const date = new Date(parseInt(dateParts[0]), parseInt(dateParts[1]) - 1, parseInt(dateParts[2]));
                const dayName = dayNames[date.getDay()];
                const dayNumber = date.getDate();
                const actualMonthName = monthNames[date.getMonth()];
                const actualYear = date.getFullYear();
                const formattedDate = `${dayName}, ${actualMonthName} ${dayNumber}${actualYear !== year ? ` ${actualYear}` : ''}`;
                const isSunday = date.getDay() === 0;
                
                tableHTML += `
                    <tr style="cursor: pointer;" onclick="openDateExpensesModal('${day.day}')" onmouseover="this.style.background='var(--gray-100)'" onmouseout="this.style.background=''">
                        <td class="day-cell"${isSunday ? ' style="color: #e53935;"' : ''}>${formattedDate}</td>
                        <td class="count-cell">${day.count || 0}</td>
                        <td class="amount-cell">${formatCurrency(day.total_amount || 0, 'PHP')}</td>
                    </tr>
                `;
            });
            
            // Add summary row
            tableHTML += `
                    </tbody>
                    <tfoot style="background: var(--gray-50); font-weight: 600;">
                        <tr>
                            <td style="padding: 16px; border-top: 2px solid var(--gray-300);">Total for ${monthName} ${year}</td>
                            <td style="text-align: center; padding: 16px; border-top: 2px solid var(--gray-300);">${monthCount}</td>
                            <td style="text-align: right; padding: 16px; border-top: 2px solid var(--gray-300); color: var(--primary); font-size: 16px;">${formatCurrency(monthTotal, 'PHP')}</td>
                        </tr>
                    </tfoot>
                </table>
            `;
            
            contentDiv.innerHTML = tableHTML;
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('customMonthDropdown');
            const selected = document.getElementById('monthDropdownSelected');
            const options = document.getElementById('monthDropdownOptions');
            
            if (!dropdown || !selected || !options) return;
            
            // Check if click is outside the dropdown
            if (!dropdown.contains(event.target)) {
                options.classList.remove('show');
                selected.classList.remove('open');
            }
        });
    </script>
</body>
</html>
